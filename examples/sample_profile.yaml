# ============================================================
# EXAMPLE: Profile for a Real Estate Agent
# ============================================================
# This shows how a filled-out profile looks.
# Copy config/profile.yaml and fill in your own details.

profile:
  name: "Jane Smith"
  business: "Smith Realty Group"
  website: "https://www.smithrealtygroup.com"
  email: "jane@smithrealtygroup.com"
  phone: "(555) 123-4567"
  youtube_handle: "@smithrealtygroup"
  booking_link: "https://calendly.com/jane-smith"
  industry: "real estate"
  credential_line: "Over 8 years helping buyers relocate to Tampa Bay."
  team_description: "solo agent"

channels:
  own:
    - handle: "@smithrealtygroup"
      name: "Smith Realty Group"
      db_name: "youtube_smith_realty"

  competitors:
    - handle: "@TampaHomeBuyer"
      name: "Tampa Home Buyer"
      db_name: "youtube_tampa_home_buyer"
    - handle: "@FloridaLivingGuide"
      name: "Florida Living Guide"
      db_name: "youtube_florida_living_guide"

  strategy:
    - handle: "@ChannelJunkies"
      name: "Channel Junkies"
      db_name: "youtube_channel_junkies"

paths:
  knowledge_bases: "./knowledge_bases/vectors"
  transcripts: "./knowledge_bases/transcripts"
  manifest: "~/.knowledge_base_ai/manifest.json"

content:
  markets:
    - "Tampa"
    - "St. Petersburg"
    - "Wesley Chapel"

  topics:
    - "relocation"
    - "neighborhoods"
    - "market updates"
    - "first-time buyers"
    - "investment properties"

  voice_markers:
    - "let me be transparent"
    - "here's the reality"

  never_say:
    - "dream home"
    - "perfect home"
